const FixedBackground=()=>{const canvasRef=useRef(null);useEffect(()=>{const canvas=canvasRef.current;if(!canvas)return;const ctx=canvas.getContext("2d");if(!ctx)return;let w=0,h=0;const dpr=Math.min(window.devicePixelRatio||1,2);const resize=()=>{w=window.innerWidth;h=window.innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.scale(dpr,dpr)};resize();window.addEventListener("resize",resize);const mob=window.innerWidth<768;const nodes=Array.from({length:mob?24:48},(_,i)=>({x:Math.random()*(w||800),y:Math.random()*(h||600),vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,r:i<4?Math.random()*1.4+1:Math.random()*0.7+0.3,alpha:i<4?0.12:Math.random()*0.05+0.02,isHub:i<4,phase:Math.random()*Math.PI*2}));const CONN=mob?80:120;let frame=0,animId;const animate=()=>{if(!w||!h){animId=requestAnimationFrame(animate);return}frame++;ctx.clearRect(0,0,w,h);nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>w)n.vx*=-1;if(n.y<0||n.y>h)n.vy*=-1;n.phase+=0.012;const pulse=Math.sin(n.phase)*0.12+0.88;ctx.save();ctx.globalAlpha=n.alpha*pulse;ctx.fillStyle=n.isHub?"#F8C080":"#ffffff";ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();ctx.restore()});for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;const dist=Math.sqrt(dx*dx+dy*dy);const maxD=nodes[i].isHub||nodes[j].isHub?CONN*1.4:CONN;if(dist<maxD){ctx.save();ctx.globalAlpha=(1-dist/maxD)*0.025;ctx.strokeStyle=G;ctx.lineWidth=0.4;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();ctx.restore()}}}animId=requestAnimationFrame(animate)};animate();return()=>{cancelAnimationFrame(animId);window.removeEventListener("resize",resize)}},[]);return React.createElement("canvas",{ref:canvasRef,style:{position:"fixed",top:0,left:0,width:"100vw",height:"100vh",pointerEvents:"none",zIndex:0}})};
